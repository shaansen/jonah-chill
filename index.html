<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EPUB Audiobook Reader</title>

  <!-- Anti-SEO: discourage search engine indexing -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="description" content="">

  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://huggingface.co https://*.hf.co https://*.huggingface.co https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; worker-src 'self' blob: https://cdn.jsdelivr.net;">

  <!-- PWA (manifest injected by vite-plugin-pwa) -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EPUB Reader">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

</head>
<body>
  <!-- Loading Spinner Overlay -->
  <div id="loading-overlay" class="loading-overlay" hidden>
    <div class="spinner"></div>
    <p id="loading-message">Loading EPUB...</p>
  </div>

  <!-- Upload View -->
  <div id="upload-view" class="view active">
    <div class="upload-container">
      <h1>EPUB Audiobook Reader</h1>
      <p class="subtitle">Upload an EPUB and listen to it</p>

      <label class="upload-btn" for="file-input">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Choose EPUB File</span>
        <input type="file" id="file-input" accept=".epub" hidden>
      </label>

      <!-- Auth button -->
      <button id="btn-auth" class="auth-link" type="button">Sign in to sync</button>

      <div id="library-section" class="library-section" hidden>
        <h2>Library</h2>
        <div id="library-list" class="library-list"></div>
      </div>
    </div>
  </div>

  <!-- Auth Drawer -->
  <div id="auth-drawer" class="drawer" hidden>
    <div class="drawer-backdrop"></div>
    <div class="drawer-content">
      <div class="drawer-header">
        <h3 id="auth-drawer-title">Sign In</h3>
        <button class="icon-btn drawer-close" aria-label="Close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="auth-form" id="auth-form">
        <input type="email" id="auth-email" class="auth-input" placeholder="Email" autocomplete="email">
        <input type="password" id="auth-password" class="auth-input" placeholder="Password" autocomplete="current-password">
        <button id="auth-submit" class="auth-submit-btn" type="button">Sign In</button>
        <p class="auth-toggle">
          <span id="auth-toggle-text">Don't have an account?</span>
          <button id="auth-toggle-btn" class="auth-toggle-link" type="button">Sign Up</button>
        </p>
        <p id="auth-error" class="auth-error" hidden></p>
      </div>
      <div class="auth-signed-in" id="auth-signed-in" hidden>
        <p class="auth-user-email" id="auth-user-email"></p>
        <button id="auth-signout" class="auth-submit-btn auth-signout-btn" type="button">Sign Out</button>
      </div>
    </div>
  </div>

  <!-- Player View -->
  <div id="player-view" class="view">
    <header class="player-header">
      <button id="btn-back" class="icon-btn" aria-label="Back to library">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="book-info">
        <h2 id="book-title">Book Title</h2>
        <p id="book-author">Author</p>
      </div>
      <button id="btn-save" class="icon-btn" aria-label="Save progress" title="Save progress">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>
      <button id="btn-search" class="icon-btn" aria-label="Search in book">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button id="btn-chapters" class="icon-btn" aria-label="Chapter list">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- Book-wide progress bar -->
    <div id="book-progress-bar" class="book-progress-bar">
      <div id="book-progress-fill" class="book-progress-fill"></div>
    </div>

    <main class="player-content">
      <div id="chapter-title" class="chapter-title">Chapter 1</div>
      <div id="current-text" class="current-text">Press play to start listening...</div>
    </main>

    <!-- Chapter Drawer -->
    <div id="chapter-drawer" class="drawer" hidden>
      <div class="drawer-backdrop"></div>
      <div class="drawer-content">
        <div class="drawer-header">
          <h3>Chapters</h3>
          <button class="icon-btn drawer-close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="drawer-search">
          <input type="text" id="chapter-search" class="chapter-search" placeholder="Search chapters..." aria-label="Search chapters">
        </div>
        <ul id="chapter-list" class="chapter-list"></ul>
      </div>
    </div>

    <!-- Search Drawer -->
    <div id="search-drawer" class="drawer" hidden>
      <div class="drawer-backdrop"></div>
      <div class="drawer-content">
        <div class="drawer-header">
          <h3>Search in Book</h3>
          <button class="icon-btn drawer-close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="drawer-search">
          <input type="text" id="book-search-input" class="chapter-search" placeholder="Search text in book..." aria-label="Search text in book">
        </div>
        <div id="search-status" class="search-status" hidden></div>
        <ul id="search-results" class="search-results"></ul>
      </div>
    </div>

    <!-- Playback Controls -->
    <div class="playback-bar">
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-labels">
          <span id="progress-percent">0%</span>
          <span id="time-remaining"></span>
          <span id="chapter-progress">Ch 1 / 1</span>
        </div>
      </div>

      <div class="controls-row">
        <button id="btn-prev" class="icon-btn" aria-label="Previous chapter">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="btn-skip-back" class="icon-btn skip-btn" aria-label="Skip back 30 seconds">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-6 6"/>
          </svg>
          <span class="skip-label">30</span>
        </button>
        <button id="btn-play" class="play-btn" aria-label="Play">
          <svg id="icon-play" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="icon-pause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" hidden>
            <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
          </svg>
        </button>
        <button id="btn-skip-forward" class="icon-btn skip-btn" aria-label="Skip forward 30 seconds">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5V1l5 5-5 5V7a6 6 0 1 1 6 6"/>
          </svg>
          <span class="skip-label">30</span>
        </button>
        <button id="btn-next" class="icon-btn" aria-label="Next chapter">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>

      <div class="settings-row">
        <div class="speed-control">
          <label for="speed-slider">Speed: <span id="speed-value">1.0x</span></label>
          <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <div class="voice-control">
          <label for="voice-select">Voice</label>
          <select id="voice-select"></select>
        </div>
        <!-- Sleep Timer -->
        <div class="sleep-control">
          <button id="btn-sleep" class="icon-btn sleep-btn" aria-label="Sleep timer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span id="sleep-countdown" class="sleep-countdown" hidden></span>
          </button>
          <div id="sleep-menu" class="sleep-menu" hidden>
            <button data-minutes="15">15 min</button>
            <button data-minutes="30">30 min</button>
            <button data-minutes="60">60 min</button>
            <button data-minutes="chapter">End of chapter</button>
            <button data-minutes="off">Off</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
